<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse Number</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: #53dcdc;
            color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            text-align: center;
            width: 320px;
        }

        h3 {
            margin-bottom: 15px;
            color: #1d7ed3;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            font-size: 18px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
            text-align: center;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            font-size: 18px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #45a049;
            transform: scale(1.05);
        }

        .result-box {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            color: #60d34e;
        }
    </style>
</head>
<body>

    <div class="container">
        <h3>Reverse a Number</h3>
        <input type="text" id="numberInput" placeholder="Enter a number">
        <button onclick="reverseNumber()">Reverse</button>
        <div class="result-box">Reversed Number: <span id="result">---</span></div>
    </div>

    <script>
        function reverseNumber() {
            let n = document.getElementById("numberInput").value.trim();
            
            if (!/^\d+$/.test(n)) {
                document.getElementById("result").innerText = "Invalid Input!";
                return;
            }

            let ans = 0;
            n = parseInt(n); 

            while (n > 0) {
                let rem = n % 10; 
                n = Math.floor(n / 10); 
                ans = rem + ans * 10; 
            }

            document.getElementById("result").innerText = ans;
        }
    </script>

</body>
</html>
