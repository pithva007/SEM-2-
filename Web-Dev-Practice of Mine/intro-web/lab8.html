<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery Events and Effects</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #e3f2fd;
            padding: 20px;
        }
        button {
            margin: 10px;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #1976d2;
            color: white;
            transition: 0.3s;
        }
        button:hover {
            background-color: #1565c0;
        }
        input {
            padding: 10px;
            font-size: 16px;
            border: 2px solid #1976d2;
            border-radius: 5px;
            margin: 10px;
        }
        #box {
            width: 200px;
            height: 200px;
            background-color: #ff9800;
            margin: 20px auto;
            display: none;
            border-radius: 15px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
            transition: 0.5s;
        }
        #hoverText {
            font-size: 18px;
            color: #333;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h2>jQuery Events & Effects Demo</h2>
    
    <!-- jQuery Events -->
    <button id="clickBtn">Click Me</button>
    <button id="dblClickBtn">Double Click Me</button>
    <input type="text" id="inputBox" placeholder="Type something">
    <p id="hoverText">Hover over me!</p>
    <p id="message"></p>

    <button id="mouseEnterBtn">Mouse Enter</button>
    <button id="mouseLeaveBtn">Mouse Leave</button>
    <select id="dropdown">
        <option value="">Select an option</option>
        <option value="Option 1">Option 1</option>
        <option value="Option 2">Option 2</option>
    </select>

    <!-- jQuery Effects -->
    <button id="showBox">Show Box</button>
    <button id="hideBox">Hide Box</button>
    <button id="fadeBox">Fade Box</button>
    <button id="slideBox">Slide Box</button>
    <button id="toggleBox">Toggle Box</button>
    <div id="box"></div>

    <script>
        $(document).ready(function() {
            // jQuery Events
            $("#clickBtn").click(() => $("#message").text("Button Clicked!"));

            $("#dblClickBtn").dblclick(() => $("#message").text("Button Double Clicked!"));

            $("#hoverText").hover(
                function() { $(this).css("color", "red"); },
                function() { $(this).css("color", "black"); }
            );

            $("#inputBox").on("input", function() {
                $("#message").text("Key Pressed: " + $(this).val());
            });

            $("#inputBox").focus(() => $("#inputBox").css("background-color", "#bbdefb"))
                           .blur(() => $("#inputBox").css("background-color", "white"));

            $("#mouseEnterBtn").mouseenter(() => $("#message").text("Mouse Entered!"));
            $("#mouseLeaveBtn").mouseleave(() => $("#message").text("Mouse Left!"));

            $("#dropdown").change(function() {
                $("#message").text("Selected: " + $(this).val());
            });

            $(document).on("contextmenu", function(e) {
                e.preventDefault();
            });

            $(document).on("keydown", function(e) {
                if (e.ctrlKey || e.key === "F12") {
                    e.preventDefault();
                }
            });

            // jQuery Effects
            $("#showBox").click(() => $("#box").fadeIn());
            
            $("#hideBox").click(() => $("#box").fadeOut());
            
            $("#fadeBox").click(() => $("#box").fadeToggle());
            
            $("#slideBox").click(() => $("#box").slideToggle());
            
            $("#toggleBox").click(() => $("#box").toggle());
        });
    </script>
</body>
</html>
