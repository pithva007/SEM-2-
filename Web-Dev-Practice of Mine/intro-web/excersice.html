<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHUSH Reveal Animation</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            height: 100vh;
            background-color: #fff;
            color: black;
            font-family: Arial, sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .container {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 3rem;
            font-weight: bold;
        }

        .name {
            font: arial;
            position: relative;
            display: inline-block;
            overflow: hidden;
            white-space: nowrap;
        }

        .name span {
            opacity: 0;
            display: inline-block;
        }

        .block {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #fff;
            animation: moveBlock 5s linear forwards;
        }

        @keyframes moveBlock {
            0% {
                transform: translateY(-100%);
            }
            90% {
                transform: translateY(200%);
            }
            100% {
                transform: translateY(-100%);
            }
        }

        @keyframes revealLetters {
            0% { opacity: 0; }
            20% { opacity: 1; }
            100% { opacity: 1; }
        }

        @keyframes rotateName {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .name span:nth-child(1) { animation: revealLetters 5s 0s forwards; }
        .name span:nth-child(2) { animation: revealLetters 5s 1s forwards; }
        .name span:nth-child(3) { animation: revealLetters 5s 2s forwards; }
        .name span:nth-child(4) { animation: revealLetters 5s 3s forwards; }
        .name span:nth-child(5) { animation: revealLetters 5s 4s forwards; }

        .name {
            animation: rotateName 2s 5s forwards;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="name">
            <span>K</span>
            <span>H</span>
            <span>U</span>
            <span>S</span>
            <span>H</span>
        </div>
        <div class="block"></div>
    </div>
</body>
</html>
