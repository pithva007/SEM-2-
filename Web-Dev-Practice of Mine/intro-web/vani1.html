<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Registration Form</title>
  <style>
    body {
      font-family: Arial;
      background-color: #f4f4f4;
      padding: 20px;
    }
    form {
      background: white;
      padding: 20px;
      max-width: 400px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      background: #007bff;
      color: white;
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    #error {
      color: red;
      margin-bottom: 10px;
    }
    #output {
      background: #d4edda;
      padding: 15px;
      margin-top: 20px;
      border-radius: 5px;
      border: 1px solid #c3e6cb;
    }
  </style>
</head>
<body>

<h2 style="text-align:center;">Registration Form</h2>
<form onsubmit="return validateForm()">
  <div id="error"></div>

  <input type="text" id="name" placeholder="Name">
  <input type="text" id="phone" placeholder="Phone Number (10 digits)">
  <input type="text" id="college" placeholder="College Name (optional)">
  <input type="password" id="password" placeholder="Password">
  <input type="password" id="confirmPassword" placeholder="Confirm Password">

  <button type="submit">Register</button>
</form>

<div id="output"></div>

<script>
  function validateForm() 
  {
    const name = document.getElementById("name").value.trim();
    const phone = document.getElementById("phone").value.trim();
    let college = document.getElementById("college").value.trim();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const errorDiv = document.getElementById("error");
    const outputDiv = document.getElementById("output");
    
    let error = "";

    // Name check
    if (name === "") {
      error += "Name is required.<br>";
    }

    // Phone check
    const phoneRegex = /^\d{10}$/;
    if (!phoneRegex.test(phone)) {
      error += "Phone number must be exactly 10 digits.<br>";
    }

    // Password check
    const passRegex = /^(?=.*\d)(?=.*\$).{5,}$/;
    if (!passRegex.test(password)) {
      error += "Password must be at least 5 characters and include at least one number and one '$'.<br>";
    }

    if (confirmPassword !== password) {
      error += "Passwords do not match.<br>";
    }

    // Default college name
    if (college === "") {
      college = "Nirma";
    }

    // Show errors or details
    if (error !== "") {
      errorDiv.innerHTML = error;
      outputDiv.innerHTML = "";
      return false;
    } else {
      errorDiv.innerHTML = "";
      outputDiv.innerHTML = `
        <h3>Registration Details</h3>
        <strong>Name:</strong> ${name}<br>
        <strong>Phone:</strong> ${phone}<br>
        <strong>College:</strong> ${college}<br>
        <strong>Password:</strong> ${password}
      `;
      return false; // prevent actual form submission
    }
  }
</script>

</body>
</html>
