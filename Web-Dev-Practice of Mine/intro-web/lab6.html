<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Game Home</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: left;
            background: url('pictures/quiz2.jpg') no-repeat center center/cover;
            color: white;
            user-select: none;
            height: 100vh;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            flex-direction: column;
            margin: 0;
            padding: 20px;
        }
        .container {
            padding: 20px;
        }
        .btn {
            padding: 10px 25px;
            font-size: 18px;
            color: white;
            background: #ff5722;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
        }
        .btn:hover {
            background: #e64a19;
        }
    </style>
</head>
<body>
    <h2>Welcome to the General Knowledge Quiz!</h2>
    <div class="container">
        <a href="quiz.html" class="btn">Start Quiz</a>

</body>
</html>
