<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Table 2a</title>
  </head>
  <body>
    <table border="3" style="text-align: center; height: 400px; width: 45%">
      <caption>
        <b>Caption : Table Example</b>
      </caption>
      <tr>
        <td colspan="3"><b>Header-1</b></td>
        <td rowspan="2" colspan="2"><b>RIGHT CORNER OF TABLE</b></td>
      </tr>
      <tr>
        <td colspan="2"><b>Header-2</b></td>
        <td><b>Header-3</b></td>
      </tr>
      <tr>
        <td>
         1. Lists can be table data<br>
         2. Images can be table data
        </td>
        <td rowspan="2" >Two Tall</td>
        <td colspan="2">Two columns merged</td>
      </tr>
      <tr>
        <td>
          <img
            src="pictures/nirma-picture.jpeg"
            alt="Nirma Image"
            style="height: 250px; width: 400px"
          />
        </td>
        <td>Data here</td>
        <td>
          <table border="1px" style="border-collapse: collapse;">
            <caption>
              <b>Caption: Nested Table</b>
            </caption>
            <tr>
              <th>Header</th>
            </tr>
            <tr>
              <td>Cell data</td>
            </tr>
          </table>
        </td>
        <td>
          <b>Multiple lines:</b>
          <pre>Line 1</pre>
          <pre>Line 2</pre>
          <pre>Line 3</pre>
        </td>
      </tr>
      <tr>
        <td colspan="5"><b>Table Footer</b></td>
      </tr>
    </table>
  </body>
</html>
