<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .login-box {
            max-width: 300px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .user-box {
            margin-bottom: 15px;
        }

        .user-box input {
            padding: 10px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        .error {
            color: red;
            font-size: 14px;
        }

        .success {
            color: green;
            font-size: 14px;
        }

        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        a {
            text-decoration: none;
            display: inline-block;
            position: relative;
        }

        a span {
            display: block;
            position: absolute;
            background: #007bff;
            transition: 0.5s;
        }

        a:hover span {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Login</h2>
        <form>
            <div class="user-box">
                <input type="text" id="username" required>
                <label>Username</label>
            </div>
            <div class="user-box">
                <input type="password" id="password" required>
                <label>Password</label>
            </div>
            <button type="button" onclick="checkCredentials()">Submit</button>
            <div id="message"></div>
        </form>
    </div>

    <script>
        function checkCredentials() {
            const correctUsername = "khush007";
            const correctPassword = "khush@2007";
            const enteredUsername = document.getElementById('username').value;
            const enteredPassword = document.getElementById('password').value;
            const message = document.getElementById('message');

            if (enteredUsername === correctUsername && enteredPassword === correctPassword) {
                message.textContent = 'Login successful!';
                message.className = 'success';
            } else {
                message.textContent = 'Invalid username or password. Please try again.';
                message.className = 'error';
            }
        }
    </script>
</body>
</html>
