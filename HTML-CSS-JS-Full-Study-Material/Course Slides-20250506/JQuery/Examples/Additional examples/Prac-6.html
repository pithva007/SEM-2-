<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Gallery using jQuery</title>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script>
$(document).ready(function(){
    $(".thumbnail").click(function(){
        var imgSrc = $(this).attr("src");
        $("#mainImage").attr("src", imgSrc);
    });
});
</script>
</head>
<body>

<div class="gallery">
    <img id="mainImage" src="placeholder.jpg" alt="Main Image">
    <div class="thumbnails">
        <img class="thumbnail" src="image1.jpeg" alt="Thumbnail 1">
        <img class="thumbnail" src="image2.jpeg" alt="Thumbnail 2">
        <img class="thumbnail" src="image3.jpeg" alt="Thumbnail 3">
    </div>
</div>

</body>
</html>
